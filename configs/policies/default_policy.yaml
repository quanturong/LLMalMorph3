# Default hard policy rules for DecisionAgent
max_sandbox_retries: 3
max_build_retries: 5
max_total_job_retries: 10

min_score_for_analysis: 0.1
escalation_score_threshold: 8.0

allowed_actions:
  DECISION_ISSUED:
    - continue_to_report
    - retry_sandbox
    - escalate_to_analyst
    - close_no_behavior
    - close_failed

hard_rules:
  - rule_id: hard_001
    name: sandbox_retry_cap
    description: Never retry sandbox if sandbox_retry_count exceeds cap
    condition: sandbox_retry_count >= max_sandbox_retries
    forced_action: escalate_to_analyst
    priority: 1

  - rule_id: hard_002
    name: total_retry_cap
    description: Never retry if total job retries exceeds cap
    condition: retry_count >= max_total_job_retries
    forced_action: close_failed
    priority: 2

  - rule_id: hard_003
    name: no_behavior_close
    description: Close when threat score is below minimum threshold
    condition: threat_score < min_score_for_analysis
    forced_action: close_no_behavior
    priority: 10

  - rule_id: hard_004
    name: high_score_escalation
    description: Escalate to analyst for very high threat score
    condition: threat_score >= escalation_score_threshold
    forced_action: escalate_to_analyst
    priority: 20
